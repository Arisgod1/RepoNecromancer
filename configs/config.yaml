app:
  log_level: info
  output_dir: ./out
  cache_dir: ./.cache/necro

analysis:
  default_years: 3
  min_stars: 5000
  max_items: 500

query:
  max_turns: 16
  max_tokens: 0
  max_cost: 0

network:
  timeout_ms: 12000
  retry_max: 3
  backoff_base_ms: 300
  allow_domains:
    - github.com
    - api.github.com
  block_domains: []
  deny_private_networks: true

permissions:
  mode: default

tools:
  deny: []

llm:
  model: qwen3.6-flash
  api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
